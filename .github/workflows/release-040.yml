name: Build StartOS package

on:
  push:
    tags:
      - "v*-startos040-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: npm ci

      - name: Build StartOS JS
        run: ./node_modules/.bin/ncc build startos/index.ts -o javascript

      - name: Install start-cli
        run: |
          curl -L https://github.com/Start9Labs/start-os/releases/download/v0.4.0-beta.7/start-cli_x86_64-linux -o start-cli
          chmod +x start-cli
          sudo mv start-cli /usr/local/bin/start-cli
          start-cli --version

      - name: Initialize developer key
        run: start-cli init-key

      - name: Build package
        run: make verify

      - name: Inspect package
        run: start-cli s9pk inspect bolt-pay.s9pk manifest | head -120

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: bolt-pay.s9pk
          body: |
            Experimental StartOS 0.4 beta package for BOLT12 Pay.

            Requirements:
            - StartOS 0.4 beta
            - LND with onion messages enabled:
              - protocol.custom-message=513
              - protocol.custom-nodeann=39
              - protocol.custom-init=39
            - Active public Lightning channels are required for BOLT12 offers.
