id: bolt-pay
title: "BOLT12 Pay"
version: 0.2.74.0
release-notes: |
  Initial Start9 dual-service packaging for BOLT12 Pay with separate LNDK service.
license: MIT
wrapper-repo: "https://github.com/Alex71btc/bolt12-pay-start9"
upstream-repo: "https://github.com/Alex71btc/lndk-pay"
support-site: "https://github.com/Alex71btc/bolt12-pay-start9/issues"
marketing-site: "https://github.com/Alex71btc/lndk-pay"
build: ["make"]
min-os-version: 0.3.5.1

description:
  short: "Self-hosted Lightning payment server with BOLT12 support."
  long: |
    BOLT12 Pay is a self-hosted Lightning payment and identity server.

    This Start9 package runs:
    - a BOLT12 Pay web service
    - a separate LNDK backend service

    Features include:
    - BOLT12 offers via LNDK
    - LNURL and Lightning Address support
    - BOLT11 fallback
    - a simple web UI for self-hosted payment flows

assets:
  license: LICENSE
  icon: assets/icon.png
  instructions: INSTRUCTIONS.md
  docker-images: image.tar

main:
  type: docker
  image: main
  entrypoint: docker_entrypoint.sh
  args: []
  mounts:
    main: /data
    lnd: /lnd

health-checks:
  main:
    name: Web UI
    description: Checks whether the BOLT12 Pay web interface is responding.
    type: docker
    image: main
    entrypoint: healthcheck.sh
    args: []
    inject: true
    system: false
    io-format: json

backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - create
      - /mnt/backup
      - /data
    mounts:
      BACKUP: "/mnt/backup"
      main: "/data"

  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - restore
      - /mnt/backup
      - /data
    mounts:
      BACKUP: "/mnt/backup"
      main: "/data"

config: ~

properties: ~

volumes:
  main:
    type: data
  lnd:
    type: pointer
    package-id: lnd
    volume-id: main
    path: /public
    readonly: true

interfaces:
  main:
    name: Web UI
    description: Web interface for BOLT12 Pay
    tor-config:
      port-mapping:
        80: "8081"
    lan-config:
      443:
        ssl: true
        internal: 8081
    ui: true
    protocols:
      - tcp
      - http

dependencies:
  lnd:
    version: ">=0.17.0 <0.21.0"
    description: Used to communicate with the Lightning Network.
    requirement:
      type: required
    config: ~

actions: {}
